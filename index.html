<!doctype html>
<html lang="">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/public/logo.png" />
    <link
      rel="stylesheet"
      href="https://cdn-uicons.flaticon.com/uicons-regular-rounded/css/uicons-regular-rounded.css"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>V-senpai</title>
  </head>
  <body>
    <div id="boot-loader" class="boot-loader hidden">
      <div class="boot-loader-card">
        <div class="boot-spinner" aria-hidden="true"></div>
        <p class="boot-text">載入中，請稍候...</p>
      </div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
    <style>
      .boot-loader {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(253, 247, 240, 0.92);
        backdrop-filter: blur(6px);
        transition: opacity 0.22s ease;
      }
      .boot-loader.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .boot-loader-card {
        min-width: 240px;
        padding: 20px 24px;
        border-radius: 14px;
        background: #fff;
        border: 1px solid rgba(167, 111, 101, 0.2);
        box-shadow: 0 14px 35px rgba(63, 40, 37, 0.12);
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .boot-spinner {
        width: 22px;
        height: 22px;
        border: 3px solid #f9d8c1;
        border-top-color: #a76f65;
        border-radius: 50%;
        animation: boot-spin 0.75s linear infinite;
        flex-shrink: 0;
      }
      .boot-text {
        margin: 0;
        font-size: 14px;
        font-weight: 600;
        color: #654039;
      }
      @keyframes boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </body>
</html>
